spring.application.name=finance-tracker
server.port=8080

# H2 in-memory (dev fallback — overridden by Docker env vars for production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JWT — secret MUST be overridden in production via APP_JWT_SECRET env var
app.jwt.secret=${APP_JWT_SECRET:ThisIsAVerySecretKeyForFinanceTrackerAppAt256BitsLongOrMore}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4000,http://middleware:4000}
