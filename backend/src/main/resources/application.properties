spring.application.name=finance-tracker
server.port=8080

# Datasource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS finance_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA/Hibernate
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_DEFAULT_SCHEMA:finance_app}
spring.jpa.show-sql=false

# Auto-create the finance_app schema before Hibernate runs (PostgreSQL only, ignored by H2)
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.sql.init.schema-locations=classpath:init-schema.sql
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JWT — secret MUST be overridden in production via APP_JWT_SECRET env var
app.jwt.secret=${APP_JWT_SECRET:ThisIsAVerySecretKeyForFinanceTrackerAppAt256BitsLongOrMore}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4000,http://middleware:4000}
