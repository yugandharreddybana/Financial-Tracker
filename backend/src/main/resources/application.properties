spring.application.name=finance-tracker
server.port=8080

# Datasource — driver & dialect are auto-detected from the JDBC URL.
# Works for both H2 (local dev) and PostgreSQL (production) with zero env-var overrides needed.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# HikariCP connection-pool resilience
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA/Hibernate — schema defaults to 'public' (works for H2 & PostgreSQL)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_DEFAULT_SCHEMA:public}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JWT — secret MUST be overridden in production via APP_JWT_SECRET env var
app.jwt.secret=${APP_JWT_SECRET:ThisIsAVerySecretKeyForFinanceTrackerAppAt256BitsLongOrMore}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4000,http://middleware:4000}
