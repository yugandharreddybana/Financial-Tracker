version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: financetracker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d financetracker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/financetracker
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_DEFAULT_SCHEMA: public
      SPRING_SQL_INIT_MODE: always
      SPRING_JPA_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-create}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-ThisIsAVerySecretKeyForFinanceTrackerAppAt256BitsLongOrMore}
      H2_CONSOLE_ENABLED: "false"
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:4000,http://middleware:4000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  middleware:
    build: ./middleware
    environment:
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: http://backend:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your_openai_api_key_here}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_gemini_api_key_here}
    depends_on:
      - backend
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    environment:
      MIDDLEWARE_HOST: middleware:4000
    depends_on:
      - middleware
    ports:
      - "3000:3000"

volumes:
  db_data:
